<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Absensi PKL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">
    
<nav class="bg-white shadow-sm p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-slate-500 hover:text-blue-600 font-semibold flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-arrow-left text-xs"></i> 
                    <span>Home</span>
                </a>
                
                <div class="h-5 w-[1px] bg-slate-200"></div>

                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md shadow-blue-200">
                        <i class="fa-solid fa-shield-halved text-white text-xs"></i>
                    </div>
                    <span class="text-xl font-blue text-slate-800 tracking-tighter font-bold">SIMAPK</span>
                </div>
            </div>
            <span class="text-slate-400 text-xs font-bold uppercase tracking-wider hidden sm:inline">Portal Absensi PKL</span>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-right-to-bracket text-blue-600 text-2xl"></i>
                </div>
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800">Selamat Datang</h2>
                <p class="text-slate-500 text-sm mt-2">Masuk untuk mengelola absensi PKL</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase ml-1">Email atau NIS</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="text" id="email" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="admin@admin / email siswa" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transform active:scale-[0.98] transition-all shadow-lg shadow-blue-200 mt-2">
                    MASUK SEKARANG
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">Belum memiliki akun? <a href="register.html" class="text-blue-600 font-bold hover:underline">Daftar di sini</a></p>
            </div>
        </div>
    </div>

  <script>
    const SUPABASE_URL = 'https://lvrhcsxeowvcrlokospr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btn-login');
        const userInput = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memverifikasi...';

        try {
            // 1. LOGIKA ADMIN STATIS (Pindahkan ke atas agar tidak hit database jika admin)
            if (userInput === 'admin@admin' || userInput === 'admin') {
                if (password === 'admin123') {
                    localStorage.setItem('role', 'admin');
                    localStorage.setItem('nama', 'Administrator');
                    // Perbaikan path: sesuaikan dengan struktur folder Anda
                    window.location.href = 'admin/dashboard.html'; 
                    return;
                } else {
                    throw new Error("Password Admin salah!");
                }
            }

            // 2. TENTUKAN EMAIL DARI NIS (Hanya jika input bukan email)
            let emailToLogin = userInput;
            if (!userInput.includes("@")) {
                const { data: nisUser, error: nisError } = await supabaseClient
                    .from('users')
                    .select('email')
                    .eq('nis', userInput)
                    .maybeSingle();

                if (nisError) throw new Error("Gagal akses database: " + nisError.message);
                if (!nisUser) throw new Error("NIS '" + userInput + "' tidak ditemukan.");
                
                emailToLogin = nisUser.email;
            }

            // 3. PROSES AUTH SUPABASE
            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                email: emailToLogin,
                password: password
            });

            if (authError) {
                // Memberikan pesan yang lebih user-friendly
                if(authError.message === "Invalid login credentials") {
                    throw new Error("Email/NIS atau Password salah.");
                }
                throw authError;
            }

            // 4. AMBIL DATA USER ROLE DARI TABEL 'users'
            const { data: userData, error: dbError } = await supabaseClient
                .from('users')
                .select('nama, role')
                .eq('id', authData.user.id)
                .maybeSingle();

            if (dbError) throw dbError;
            
            // JIKA AKUN AUTH ADA TAPI DI TABEL 'users' TIDAK ADA (Data Corrupt/Manual Register)
            if (!userData) {
                // Default ke siswa jika data profil tidak ditemukan
                localStorage.setItem('role', 'siswa');
                localStorage.setItem('user_id', authData.user.id);
                localStorage.setItem('nama', authData.user.email);
                window.location.href = 'siswa/dashboard.html';
                return;
            }

            // 5. SIMPAN KE LOCAL STORAGE
            localStorage.setItem('role', userData.role || 'siswa');
            localStorage.setItem('user_id', authData.user.id);
            localStorage.setItem('nama', userData.nama);

            // 6. REDIRECT BERDASARKAN ROLE
            // Gunakan path relatif (tanpa '/' di awal jika file di folder yang sama)
            if (userData.role === 'admin') {
                window.location.href = 'admin/dashboard.html';
            } else {
                window.location.href = 'siswa/dashboard.html';
            }

        } catch (err) {
            alert(err.message);
            console.error("Detail Error:", err);
            btn.disabled = false;
            btn.innerText = "MASUK SEKARANG";
        }
    });
</script>
</body>
</html>
