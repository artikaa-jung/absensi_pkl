<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Absensi - SIMAPK Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-[60]">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-shield-alt text-xs"></i>
            </div>
            <h1 class="font-bold text-blue-400 italic">SIMAPK ADMIN</h1>
        </div>
        <button onclick="toggleSidebar()" class="p-2 text-2xl focus:outline-none">
            <i class="fas fa-bars" id="menu-icon"></i>
        </button>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[70] w-64 bg-slate-900 text-white p-6 transform -translate-x-full md:relative md:translate-x-0 flex-shrink-0 flex flex-col transition-transform duration-300">
            <div class="hidden md:flex items-center space-x-3 mb-8">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-shield-alt text-lg"></i>
                </div>
                <h1 class="text-2xl font-bold text-blue-400 tracking-tight italic">SIMAPK</h1>
            </div>
            
            <nav class="space-y-2 flex-1">
                <a href="dashboard.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition text-slate-400 hover:text-white">
                    <i class="fas fa-chart-pie mr-3 w-5"></i>Ringkasan
                </a>
                <a href="pt_siswa.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition text-slate-400 hover:text-white">
                    <i class="fas fa-building mr-3 w-5"></i>Data PT 
                </a>
                <a href="monitoring-absen.html" class="flex items-center p-3 rounded-xl bg-blue-600 font-bold shadow-lg shadow-blue-900/20 transition-all text-white">
                    <i class="fas fa-desktop mr-3 w-5"></i>Monitoring Real-time
                </a>
                <a href="data-siswa.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition text-slate-400 hover:text-white">
                    <i class="fas fa-user-graduate mr-3 w-5"></i>Data Siswa
                </a>
                <a href="rekap-absen.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition text-slate-400 hover:text-white">
                    <i class="fas fa-clipboard-list mr-3 w-5"></i>Rekap Absensi
                </a>
                
                <hr class="border-slate-800 my-6">
                
                <button onclick="logout()" class="w-full flex items-center p-3 rounded-xl text-red-400 hover:bg-red-900/20 transition font-bold">
                    <i class="fas fa-sign-out-alt mr-3 w-5"></i>Keluar
                </button>
            </nav>
        </aside>

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[65] hidden md:hidden backdrop-blur-sm"></div>

        <main class="flex-1 p-6 md:p-10">
            <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">Monitoring Real-Time</h2>
                    <p class="text-slate-500 text-sm md:text-base">Pantau lokasi dan foto presensi siswa hari ini.</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3 w-full md:w-auto">
                    <i class="fas fa-calendar-alt text-blue-500"></i>
                    <input type="date" id="filter-date" onchange="fetchMonitoringData()" class="outline-none py-1 text-sm font-bold bg-transparent flex-1">
                </div>
            </header>

            <div id="monitoring-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md hidden z-[100] flex flex-col items-center justify-center p-4" onclick="closeModal()">
        <div class="relative max-w-xl w-full flex flex-col items-center animate-in zoom-in duration-300">
            <img id="modal-img" src="" class="max-w-full max-h-[70vh] rounded-[2rem] border-4 border-white shadow-2xl mb-6 object-contain">
            <div class="text-center px-4">
                <p class="text-white font-bold text-xl mb-1" id="modal-caption"></p>
                <p class="text-slate-400 text-sm font-medium">Klik di mana saja untuk menutup</p>
            </div>
        </div>
    </div>

<script>
const SUPABASE_URL = "https://lvrhcsxeowvcrlokospr.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8"
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const filterDateInput = document.getElementById('filter-date');
const savedDate = sessionStorage.getItem('selectedDate');

if (savedDate) {
    filterDateInput.value = savedDate;
} else {
    filterDateInput.valueAsDate = new Date();
}

// --- SIDEBAR TOGGLE ---
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const icon = document.getElementById('menu-icon');
    const isClosed = sidebar.classList.contains('-translate-x-full');

    if (isClosed) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
        icon.classList.replace('fa-bars', 'fa-times');
        document.body.classList.add('no-scroll');
    } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
        icon.classList.replace('fa-times', 'fa-bars');
        document.body.classList.remove('no-scroll');
    }
}

async function logout() {
    if (confirm("Apakah Anda yakin ingin keluar dari sistem admin?")) {
        await db.auth.signOut();
        localStorage.clear();
        window.location.replace("../login.html");
    }
}

async function fetchMonitoringData() {
    const tanggal = filterDateInput.value;
    const grid = document.getElementById("monitoring-grid");
    
    sessionStorage.setItem('selectedDate', tanggal);
    grid.innerHTML = `<div class="col-span-full text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-4xl"></i><p class="mt-4 text-slate-500 font-medium">Sinkronisasi data...</p></div>`;

    try {
        const { data, error } = await db
            .from("absensi")
            .select(`
                *,
                profil_siswa!fk_absensi_profil ( nama, kelas )
            `)
            .eq("tanggal", tanggal)
            .order("created_at", { ascending: false });

        if (error) throw error;
        renderData(data);

    } catch (err) {
        console.error("Fetch error:", err.message);
        grid.innerHTML = `<p class="col-span-full text-center py-20 text-red-500 font-bold">Terjadi kesalahan saat memuat data.</p>`;
    }
}

function renderData(data) {
    const grid = document.getElementById("monitoring-grid");
    grid.innerHTML = "";

    if (!data || data.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
            <i class="fas fa-folder-open text-slate-300 text-5xl mb-4"></i>
            <p class="text-slate-500 italic">Tidak ada rekaman absensi pada tanggal ini.</p>
        </div>`;
        return;
    }

    data.forEach(item => {
        const nama = item.profil_siswa?.nama || "Siswa Anonim";
        const kelas = item.profil_siswa?.kelas || "-";
        const status = item.status || "-";
        const foto = item.foto_url || "";
        const jam = item.jam_masuk || "--:--";
        
        // Fix penulisan template literal untuk Google Maps
        let mapsLink = (item.latitude && item.longitude) 
            ? `https://www.google.com/maps?q=${item.latitude},${item.longitude}` 
            : null;

        const card = `
            <div class="bg-white rounded-[2.5rem] shadow-sm p-6 border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                <div class="flex items-center gap-4 mb-5">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200 shrink-0">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="overflow-hidden">
                        <h3 class="font-bold text-slate-800 text-lg leading-tight truncate">${nama}</h3>
                        <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mt-0.5">${kelas}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Status</p>
                        <p class="text-sm font-black ${getStatusTextColor(status)}">${status}</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Waktu</p>
                        <p class="text-sm font-black text-slate-700">${jam} <span class="text-[10px] text-slate-400 font-normal">WIB</span></p>
                    </div>
                </div>

                <div class="relative group cursor-pointer mb-5" onclick="openModal('${foto}','${nama}')">
                    ${foto ? `
                        <img src="${foto}" class="rounded-3xl w-full h-44 object-cover border border-slate-100 shadow-inner">
                        <div class="absolute inset-0 bg-blue-600/20 opacity-0 group-hover:opacity-100 transition-all duration-300 rounded-3xl flex items-center justify-center">
                            <span class="bg-white text-blue-600 px-4 py-2 rounded-full text-[10px] font-black shadow-xl">LIHAT DETAIL</span>
                        </div>
                    ` : `
                        <div class="h-44 bg-slate-100 rounded-3xl flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200">
                            <i class="fas fa-image-slash text-2xl mb-2"></i>
                            <span class="text-xs font-bold uppercase tracking-widest">Foto Tidak Ada</span>
                        </div>
                    `}
                </div>

                ${mapsLink ? `
                    <a href="${mapsLink}" target="_blank" class="mt-auto w-full py-4 bg-slate-900 text-white rounded-2xl text-center text-xs font-bold hover:bg-blue-600 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-200">
                        <i class="fas fa-location-dot"></i> TRACK LOKASI SISWA
                    </a>
                ` : `
                    <button disabled class="mt-auto w-full py-4 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-black cursor-not-allowed uppercase tracking-widest border border-slate-200">
                        GPS Koordinat Kosong
                    </button>
                `}
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', card);
    });
}

function getStatusTextColor(status) {
    const s = status?.toLowerCase();
    if(s === 'hadir') return 'text-emerald-600';
    if(s === 'izin') return 'text-amber-600';
    if(s === 'sakit') return 'text-rose-600';
    return 'text-slate-700';
}

function openModal(src, caption) {
    if(!src) return;
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("modal-img").src = src;
    document.getElementById("modal-caption").innerText = "Bukti Presensi: " + caption;
    document.body.classList.add('no-scroll');
}

function closeModal() {
    document.getElementById("modal").classList.add("hidden");
    document.body.classList.remove('no-scroll');
}

// Inisialisasi awal
fetchMonitoringData();
</script>
</body>
</html>
