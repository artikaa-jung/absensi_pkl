<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Siswa - Absensi PKL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">
    
<nav class="bg-white shadow-sm p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-slate-500 hover:text-blue-600 font-semibold flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-arrow-left text-xs"></i> 
                    <span>Home</span>
                </a>
                
                <div class="h-5 w-[1px] bg-slate-200"></div>

                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md shadow-blue-200">
                        <i class="fa-solid fa-shield-halved text-white text-xs"></i>
                    </div>
                    <span class="text-xl font-blue text-slate-800 tracking-tighter font-bold">SIMAPK</span>
                </div>
            </div>

            <span class="text-slate-400 text-xs font-bold uppercase tracking-wider hidden sm:inline">Pendaftaran Siswa</span>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-lg border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-plus text-blue-600 text-2xl"></i>
                </div>
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800">Buat Akun Siswa</h2>
                <p class="text-slate-500 text-sm mt-2">Silakan isi data diri sesuai kartu pelajar</p>
            </div>
            
            <form id="register-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600 uppercase ml-1">Nama Lengkap</label>
                        <input type="text" id="nama" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Nama lengkap" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600 uppercase ml-1">NIS</label>
                        <input type="text" id="nis" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Nomor Induk" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase ml-1">Kelas</label>
                    <input type="text" id="kelas" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Contoh: XI TKJ 1 (capslock)" required>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase ml-1">Email Aktif</label>
                    <input type="email" id="email" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="@email.com" required>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase ml-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Min 8" required>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transform active:scale-[0.98] transition-all shadow-lg shadow-blue-200 mt-4">
                    DAFTAR SEKARANG
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">Sudah memiliki akun? <a href="login.html" class="text-blue-600 font-bold hover:underline">Login di sini</a></p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lvrhcsxeowvcrlokospr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8'; // Gunakan Anon Key Anda
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            // Ambil Data
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nama = document.getElementById('nama').value;
            const nis = document.getElementById('nis').value;
            const kelas = document.getElementById('kelas').value;

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                // 1. Masukkan ke Auth Supabase (Agar bisa login secara resmi)
                const { data: authData, error: authError } = await _supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                // 2. Masukkan ke tabel public.users kustom Anda
                const { error: dbError } = await _supabase
                    .from('users')
                    .insert([
                        { 
                            id: authData.user.id, // Sinkronkan ID Auth dengan ID tabel users
                            nama: nama, 
                            nis: nis, 
                            kelas: kelas, 
                            email: email,
                            password: password, // Menyimpan plain password (tidak disarankan untuk prod, tapi sesuai kriteria anda)
                            role: 'siswa' 
                        }
                    ]);

                if (dbError) throw dbError;

                alert("Pendaftaran Berhasil! Silakan Login.");
                window.location.href = 'login.html';

            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "DAFTAR SEKARANG";
            }
        });
    </script>
</body>
</html>
