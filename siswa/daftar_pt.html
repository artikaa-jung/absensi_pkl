<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokasi PKL - SIMAPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #map { height: 250px; width: 100%; border-radius: 1.5rem; border: 2px solid #eff6ff; z-index: 10; }
        
        /* Sidebar Transition */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-[60]">
        <h1 class="text-xl font-bold text-blue-400">SIMAPK</h1>
        <button onclick="toggleSidebar()" class="p-2 text-2xl focus:outline-none">
            <i class="fas fa-bars" id="menu-icon"></i>
        </button>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[70] w-64 bg-slate-900 text-white p-6 transform -translate-x-full md:relative md:translate-x-0 flex-shrink-0 flex flex-col">
            <h1 class="hidden md:block text-2xl font-bold mb-8 text-blue-400 tracking-tight">SIMAPK</h1>

            <nav class="space-y-2 flex-1">
                <a href="dashboard.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                    <i class="fas fa-home mr-3 w-5"></i>Dashboard
                </a>
                <a href="profil.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                    <i class="fas fa-user-circle mr-3 w-5"></i>Profil
                </a>
                <a href="absensi.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                    <i class="fas fa-camera mr-3 w-5"></i>Absensi
                </a>
                <a href="regist-wajah.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                    <i class="fas fa-user-shield mr-3 w-5"></i>Regist Wajah
                </a>
                <a href="daftar_pt.html" class="flex items-center p-3 rounded bg-blue-600 transition shadow-lg shadow-blue-900/20">
                    <i class="fas fa-building mr-3 w-5"></i>Daftar PT
                </a>
                <a href="rekap.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                    <i class="fas fa-calendar-check mr-3 w-5"></i>Rekap Absensi
                </a>

                <hr class="border-slate-700 my-4 opacity-50">

                <button onclick="logout()" class="w-full text-left p-3 rounded text-red-400 hover:bg-red-900/20 transition">
                    <i class="fas fa-sign-out-alt mr-3 w-5"></i>Keluar
                </button>
            </nav>
        </aside>

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[65] hidden md:hidden"></div>

        <main class="flex-1 p-6 md:p-10">
            <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">Cari Lokasi PKL</h2>
                    <p class="text-slate-500 mt-1 text-sm">Pilih lokasi tersedia atau daftarkan tempat baru.</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center justify-center">
                    <i class="fas fa-plus mr-2"></i> Tambah PT Baru
                </button>
            </header>

            <div id="my-pt-status" class="mb-8"></div>

            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" onkeyup="filterPT()" placeholder="Cari nama perusahaan..." class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition">
            </div>

            <div id="pt-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="modal-pt" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-white animate-fade-in">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold text-slate-800">Daftarkan PT Baru</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            
            <div class="p-6 md:p-8 space-y-4 max-h-[85vh] overflow-y-auto hide-scrollbar">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nama Perusahaan</label>
                    <input type="text" id="in-nama" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-blue-400 transition" placeholder="PT. Nama Perusahaan">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Alamat Kantor</label>
                    <textarea id="in-alamat" rows="2" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-blue-400 transition" placeholder="Alamat lengkap..."></textarea>
                </div>

                <div class="bg-blue-50 p-4 rounded-[2rem] border border-blue-100 space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-bold text-blue-700 uppercase tracking-widest">Tentukan Lokasi</span>
                        <button onclick="getCurrentLocation()" id="btn-gps" class="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded-xl font-bold hover:bg-blue-700">POSISI SAYA</button>
                    </div>
                    
                    <div id="map"></div>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="in-lat" readonly class="bg-white text-[10px] p-3 rounded-xl border border-blue-100 text-slate-500 text-center" placeholder="Latitude">
                        <input type="text" id="in-lng" readonly class="bg-white text-[10px] p-3 rounded-xl border border-blue-100 text-slate-500 text-center" placeholder="Longitude">
                    </div>
                </div>

                <button onclick="saveNewPT()" id="btn-save" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold shadow-xl hover:bg-blue-600 transition-all">
                    Simpan & Daftarkan
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SB_URL = "https://lvrhcsxeowvcrlokospr.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null, allPTData = [], mySelectedPTId = null;
        let map, marker;

        // --- FUNGSI TOGGLE SIDEBAR ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const icon = document.getElementById('menu-icon');
            const isClosed = sidebar.classList.contains('-translate-x-full');

            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                icon.classList.replace('fa-bars', 'fa-times');
                document.body.classList.add('no-scroll');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                icon.classList.replace('fa-times', 'fa-bars');
                document.body.classList.remove('no-scroll');
            }
        }

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = '../login.html'; return; }
            currentUser = session.user;
            await loadAllData();
        }

        async function loadAllData() {
            const { data: profil } = await _supabase.from('profil_siswa').select('pt_id').eq('user_id', currentUser.id).maybeSingle();
            mySelectedPTId = profil?.pt_id;

            const { data: ptList } = await _supabase.from('pt').select('*').order('nama_pt');
            allPTData = ptList || [];
            renderPTCards();
            renderMyStatus();
        }

        function renderMyStatus() {
            const container = document.getElementById('my-pt-status');
            const myPT = allPTData.find(i => i.id === mySelectedPTId);
            if (myPT) {
                container.innerHTML = `
                    <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-6 rounded-[2rem] text-white shadow-xl flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center"><i class="fas fa-building"></i></div>
                            <div>
                                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Lokasi Aktif</p>
                                <h4 class="text-xl font-bold">${myPT.nama_pt}</h4>
                            </div>
                        </div>
                        <span class="px-4 py-2 bg-white/20 rounded-xl text-xs font-bold border border-white/30 italic">Radius Absen: 100m</span>
                    </div>`;
            } else {
                container.innerHTML = `<div class="p-6 bg-amber-50 border border-amber-200 rounded-[2rem] text-amber-700 font-medium text-center italic text-sm">⚠️ Anda belum memilih tempat PKL.</div>`;
            }
        }

        function renderPTCards() {
            const grid = document.getElementById('pt-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPTData.filter(pt => pt.nama_pt.toLowerCase().includes(search));

            grid.innerHTML = filtered.map(pt => `
                <div class="bg-white p-6 rounded-[2rem] border ${pt.id === mySelectedPTId ? 'border-blue-500 ring-2 ring-blue-500/10' : 'border-slate-100'} shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-2 truncate">${pt.nama_pt}</h4>
                    <p class="text-xs text-slate-500 mb-4 line-clamp-2 h-8"><i class="fas fa-map-marker-alt mr-1"></i> ${pt.alamat || 'Alamat belum diatur'}</p>
                    <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                        <span class="text-[10px] font-bold text-slate-300">ID: ${pt.id.split('-')[0]}</span>
                        ${pt.id === mySelectedPTId 
                            ? `<button disabled class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold">AKTIF</button>`
                            : `<button onclick="selectPT('${pt.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">PILIH</button>`}
                    </div>
                </div>`).join('');
        }

        function filterPT() { renderPTCards(); }

        // --- PETA LOGIC ---
        function initMap() {
            if (map) return;
            map = L.map('map').setView([-6.200000, 106.816666], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([-6.200000, 106.816666], { draggable: true }).addTo(map);

            marker.on('dragend', () => {
                const pos = marker.getLatLng();
                updateCoords(pos.lat, pos.lng);
            });
            map.on('click', (e) => {
                marker.setLatLng(e.latlng);
                updateCoords(e.latlng.lat, e.latlng.lng);
            });
        }

        function updateCoords(lat, lng) {
            document.getElementById('in-lat').value = lat.toFixed(8);
            document.getElementById('in-lng').value = lng.toFixed(8);
        }

        function openModal() {
            document.getElementById('modal-pt').classList.remove('hidden');
            document.body.classList.add('no-scroll');
            setTimeout(() => { 
                initMap(); 
                map.invalidateSize(); 
            }, 300);
        }

        function closeModal() { 
            document.getElementById('modal-pt').classList.add('hidden'); 
            document.body.classList.remove('no-scroll');
        }

        function getCurrentLocation() {
            const btn = document.getElementById('btn-gps');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                updateCoords(latitude, longitude);
                map.setView([latitude, longitude], 17);
                marker.setLatLng([latitude, longitude]);
                btn.innerHTML = originalText;
            }, () => {
                alert("Gagal ambil lokasi! Pastikan GPS aktif.");
                btn.innerHTML = originalText;
            }, { enableHighAccuracy: true });
        }

        // --- DATABASE LOGIC ---
        async function selectPT(id) {
            if(!confirm("Gunakan lokasi ini sebagai tempat PKL?")) return;
            
            const { data: profile } = await _supabase.from('profil_siswa').select('*').eq('user_id', currentUser.id).maybeSingle();
            
            const { error } = await _supabase.from('profil_siswa').upsert({
                user_id: currentUser.id,
                pt_id: id,
                nama: profile?.nama || currentUser.user_metadata.full_name || "Siswa",
                nis: profile?.nis || "0",
                kelas: profile?.kelas || "-",
                email: currentUser.email
            }, { onConflict: 'user_id' });

            if (!error) { 
                alert("Berhasil memilih lokasi!"); 
                loadAllData(); 
            } else {
                alert("Gagal: " + error.message);
            }
        }

        async function saveNewPT() {
            const nama = document.getElementById('in-nama').value;
            const alamat = document.getElementById('in-alamat').value;
            const lat = document.getElementById('in-lat').value;
            const lng = document.getElementById('in-lng').value;
            
            if (!nama || !lat) return alert("Lengkapi data perusahaan dan titik koordinat!");

            // Masukkan PT Baru
            const { data, error } = await _supabase.from('pt').upsert({
                nama_pt: nama, 
                alamat, 
                latitude: lat, 
                longitude: lng, 
                user_id: currentUser.id
            }, { onConflict: 'user_id' }).select().single();

            if (!error) { 
                await selectPT(data.id); 
                closeModal(); 
                loadAllData(); 
            } else {
                alert("Gagal menyimpan: " + error.message);
            }
        }

        async function logout() {
            if (confirm("Apakah Anda yakin ingin keluar?")) {
                await _supabase.auth.signOut();
                localStorage.clear();
                window.location.replace("../login.html");
            }
        }

        init();
    </script>
</body>
</html>
