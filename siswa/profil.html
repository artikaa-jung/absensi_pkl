<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - SIMAPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-slate-900 text-white p-6 flex-shrink-0">
    <h1 class="text-2xl font-bold mb-8 text-blue-400 tracking-tight">SIMAPK</h1>

    <nav class="space-y-2">

        <!-- Dashboard -->
        <a href="dashboard.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
            <i class="fas fa-home mr-3"></i>Dashboard
        </a>

        <!-- Profil (ACTIVE) -->
        <a href="profil.html" class="flex items-center p-3 rounded bg-blue-600 transition shadow-lg shadow-blue-900/20">
            <i class="fas fa-user-circle mr-3"></i>Profil
        </a>

        <!-- Absensi -->
        <a href="absensi.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
            <i class="fas fa-camera mr-3"></i>Absensi
        </a>

        <!-- Registrasi Wajah -->
        <a href="regist-wajah.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
            <i class="fas fa-user-shield mr-3"></i>Regist Wajah
        </a>

        <!-- Daftar PT -->
        <a href="daftar_pt.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
            <i class="fas fa-building mr-3"></i>Daftar PT
        </a>

        <a href="rekap.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition">
                <i class="fas fa-calendar-check mr-3"></i>Rekap Absensi
            </a>

        <hr class="border-slate-700 my-4 opacity-50">

        <!-- Logout -->
        <button onclick="logout()" class="w-full text-left p-3 rounded text-red-400 hover:bg-red-900/20 transition">
            <i class="fas fa-sign-out-alt mr-3"></i>Keluar
        </button>

    </nav>
</aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Profil Siswa</h2>
                <p class="text-slate-500 mt-1">Lengkapi data identitas dan jadwal jam kerja PKL Anda.</p>
            </header>

            <div class="max-w-4xl bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-blue-600 h-32 relative">
                    <div class="absolute -bottom-12 left-8">
                        <div class="w-24 h-24 bg-white rounded-2xl p-1 shadow-md">
                            <img id="avatar" src="https://ui-avatars.com/api/?name=Siswa&background=random" class="w-full h-full rounded-xl object-cover">
                        </div>
                    </div>
                </div>

                <form id="profile-form" class="p-8 pt-16 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <h3 class="font-bold text-slate-700 border-b pb-2 text-sm uppercase tracking-wide">Identitas Dasar</h3>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Lengkap</label>
                                <input type="text" id="nama" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-500 cursor-not-allowed" readonly>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">NIS</label>
                                <input type="text" id="nis" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-500 cursor-not-allowed" readonly>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Kelas</label>
                                <input type="text" id="kelas" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-500 cursor-not-allowed" readonly>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="font-bold text-slate-700 border-b pb-2 text-sm uppercase tracking-wide">Informasi PKL</h3>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tempat PKL (Perusahaan)</label>
                                <div class="flex items-center gap-3 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl">
                                    <i class="fas fa-building text-blue-500"></i>
                                    <input type="text" id="nama_pt" class="w-full bg-transparent outline-none text-slate-700 font-bold text-sm" placeholder="Pilih di menu Daftar PT" readonly>
                                    <input type="hidden" id="pt_id_hidden">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Jam Masuk</label>
                                    <div class="flex items-center gap-2 px-4 py-3 bg-white border border-slate-200 rounded-xl focus-within:ring-2 focus-within:ring-blue-500 transition">
                                        <i class="far fa-clock text-blue-500"></i>
                                        <input type="time" id="jam_masuk" class="bg-transparent outline-none w-full text-slate-700 font-medium">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Jam Keluar</label>
                                    <div class="flex items-center gap-2 px-4 py-3 bg-white border border-slate-200 rounded-xl focus-within:ring-2 focus-within:ring-blue-500 transition">
                                        <i class="far fa-clock text-red-500"></i>
                                        <input type="time" id="jam_keluar" class="bg-transparent outline-none w-full text-slate-700 font-medium">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">No. Telepon/WA</label>
                                <input type="text" id="no_tlp" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="0812xxxx">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tanggal Masuk PKL</label>
                                <input type="date" id="tgl_masuk_pkl" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pembimbing Sekolah</label>
                                <input type="text" id="pembimbing_pkl" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Nama Guru Pembimbing">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col md:flex-row gap-4 justify-between border-t border-slate-100">
                        <button type="button" onclick="deleteProfile()" class="text-red-500 hover:text-red-700 font-bold text-sm transition">
                            <i class="fas fa-trash-alt mr-1"></i> Kosongkan Informasi
                        </button>

                        <button type="submit" id="btn-save" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                            <i class="fas fa-save mr-2"></i> Simpan Informasi
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
    const SB_URL = "https://lvrhcsxeowvcrlokospr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUserId = null;
    let currentUserEmail = null;

    async function loadProfile() {
        try {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = '../login.html'; return; }
            
            currentUserId = session.user.id;
            currentUserEmail = session.user.email;

            // 1. Ambil data MASTER dari tabel 'users'
            const { data: userData } = await _supabase
                .from('users')
                .select('*')
                .eq('id', currentUserId)
                .maybeSingle();

            if (userData) {
                document.getElementById('nama').value = userData.nama || '';
                document.getElementById('nis').value = userData.nis || '';
                document.getElementById('kelas').value = userData.kelas || '';
                document.getElementById('avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.nama || 'Siswa')}&background=random`;
            }

            // 2. Ambil data TAMBAHAN dari 'profil_siswa'
            const { data: profilData } = await _supabase
                .from('profil_siswa')
                .select(`*, pt!profil_siswa_pt_id_fkey (nama_pt)`)
                .eq('user_id', currentUserId)
                .maybeSingle();

            if (profilData) {
                document.getElementById('no_tlp').value = profilData.no_tlp || '';
                document.getElementById('tgl_masuk_pkl').value = profilData.tgl_masuk_pkl || '';
                document.getElementById('pembimbing_pkl').value = profilData.pembimbing_pkl || '';
                document.getElementById('pt_id_hidden').value = profilData.pt_id || '';
                // Load jam masuk dan jam keluar
                document.getElementById('jam_masuk').value = profilData.jam_masuk || '';
                document.getElementById('jam_keluar').value = profilData.jam_keluar || '';

                if (profilData.pt) {
                    document.getElementById('nama_pt').value = profilData.pt.nama_pt;
                }
            }

            // 3. LOGIKA OTOMATIS: Cek PT dari localStorage
            const selectedId = localStorage.getItem('selected_pt_id');
            const selectedNama = localStorage.getItem('selected_pt_nama');
            
            if (selectedId) {
                document.getElementById('pt_id_hidden').value = selectedId;
                document.getElementById('nama_pt').value = selectedNama;
                localStorage.removeItem('selected_pt_id');
                localStorage.removeItem('selected_pt_nama');
            }

        } catch (err) { console.error("Load error:", err); }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan...';

        try {
            const ptIdToSave = document.getElementById('pt_id_hidden').value;

            const { error } = await _supabase
                .from('profil_siswa')
                .upsert({
                    user_id: currentUserId,
                    nama: document.getElementById('nama').value,
                    nis: document.getElementById('nis').value,
                    kelas: document.getElementById('kelas').value,
                    email: currentUserEmail,
                    no_tlp: document.getElementById('no_tlp').value,
                    tgl_masuk_pkl: document.getElementById('tgl_masuk_pkl').value || null,
                    pembimbing_pkl: document.getElementById('pembimbing_pkl').value,
                    pt_id: ptIdToSave || null,
                    // Simpan data jam masuk dan keluar
                    jam_masuk: document.getElementById('jam_masuk').value || null,
                    jam_keluar: document.getElementById('jam_keluar').value || null
                }, { onConflict: 'user_id' });

            if (error) throw error;
            alert("Profil dan jadwal berhasil diperbarui!");
            loadProfile(); 

        } catch (err) {
            alert("Gagal simpan: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i> Simpan Informasi';
        }
    });

    async function deleteProfile() {
        if (!confirm("Hapus data tambahan?")) return;
        const { error } = await _supabase
            .from('profil_siswa')
            .update({
                no_tlp: '',
                tgl_masuk_pkl: null,
                pembimbing_pkl: '',
                pt_id: null,
                jam_masuk: null,
                jam_keluar: null
            })
            .eq('user_id', currentUserId);

        if (!error) {
            alert("Data dikosongkan.");
            location.reload();
        }
    }

async function logout() {
    const konfirmasi = confirm("Apakah Anda yakin ingin keluar dari sistem admin?");
    
    if (konfirmasi) {
        try {
            await _supabase.auth.signOut();
            localStorage.clear();
            sessionStorage.clear();

            // PERBAIKAN DI SINI:
            // Jika dashboard.html ada di dalam folder 'admin'
            // Gunakan '../' untuk naik satu tingkat ke folder utama tempat login.html berada
            window.location.replace("../login.html");

        } catch (err) {
            console.error("Gagal Logout:", err.message);
            // Backup jika path ../ gagal, coba ke root
            window.location.replace("/login.html");
        }
    }
}

    document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
