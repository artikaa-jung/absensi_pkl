<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - SIMAPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Sidebar Transition */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-[60]">
        <h1 class="text-xl font-bold text-blue-400">SIMAPK</h1>
        <button onclick="toggleSidebar()" class="p-2 text-2xl focus:outline-none">
            <i class="fas fa-bars" id="menu-icon"></i>
        </button>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[70] w-64 bg-slate-900 text-white p-6 transform -translate-x-full md:relative md:translate-x-0 flex-shrink-0 flex flex-col transition-transform duration-300">
            <h1 class="hidden md:block text-2xl font-bold mb-8 text-blue-400 tracking-tight">SIMAPK</h1>

            <nav class="space-y-2 flex-1">
                <a href="dashboard.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition text-slate-300">
                    <i class="fas fa-home mr-3 w-5"></i>Dashboard
                </a>
                <a href="profil.html" class="flex items-center p-3 rounded bg-blue-600 transition shadow-lg shadow-blue-900/20 text-white">
                    <i class="fas fa-user-circle mr-3 w-5"></i>Profil
                </a>
                <a href="absensi.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition text-slate-300">
                    <i class="fas fa-camera mr-3 w-5"></i>Absensi
                </a>
                <a href="regist-wajah.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition text-slate-300">
                    <i class="fas fa-user-shield mr-3 w-5"></i>Regist Wajah
                </a>
                <a href="daftar_pt.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition text-slate-300">
                    <i class="fas fa-building mr-3 w-5"></i>Daftar PT
                </a>
                <a href="rekap.html" class="flex items-center p-3 rounded hover:bg-slate-800 transition text-slate-300">
                    <i class="fas fa-calendar-check mr-3 w-5"></i>Rekap Absensi
                </a>

                <hr class="border-slate-700 my-4 opacity-50">

                <button onclick="logout()" class="w-full text-left p-3 rounded text-red-400 hover:bg-red-900/20 transition">
                    <i class="fas fa-sign-out-alt mr-3 w-5"></i>Keluar
                </button>
            </nav>
        </aside>

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[65] hidden md:hidden"></div>

        <main class="flex-1 p-4 md:p-10">
            <header class="mb-8">
                <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Profil Siswa</h2>
                <p class="text-slate-500 mt-1 text-sm md:text-base">Lengkapi data identitas dan jadwal jam kerja PKL Anda.</p>
            </header>

            <div class="max-w-4xl bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mx-auto">
                <div class="bg-gradient-to-r from-blue-600 to-blue-800 h-24 md:h-32 relative">
                    <div class="absolute -bottom-10 left-6 md:left-8">
                        <div class="w-20 h-20 md:w-24 md:h-24 bg-white rounded-2xl p-1 shadow-md">
                            <img id="avatar" src="https://ui-avatars.com/api/?name=Siswa&background=random" class="w-full h-full rounded-xl object-cover">
                        </div>
                    </div>
                </div>

                <form id="profile-form" class="p-6 md:p-8 pt-14 md:pt-16 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <h3 class="font-bold text-slate-700 border-b pb-2 text-xs uppercase tracking-widest">Identitas Dasar</h3>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nama Lengkap</label>
                                <input type="text" id="nama" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 cursor-not-allowed text-sm" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">NIS</label>
                                <input type="text" id="nis" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 cursor-not-allowed text-sm" readonly>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Kelas</label>
                                <input type="text" id="kelas" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 cursor-not-allowed text-sm" readonly>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="font-bold text-slate-700 border-b pb-2 text-xs uppercase tracking-widest">Informasi PKL</h3>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tempat PKL (Perusahaan)</label>
                                <div class="flex items-center gap-3 px-4 py-3 bg-blue-50/50 border border-blue-100 rounded-xl">
                                    <i class="fas fa-building text-blue-500"></i>
                                    <input type="text" id="nama_pt" class="w-full bg-transparent outline-none text-slate-700 font-bold text-sm" placeholder="Pilih di menu Daftar PT" readonly>
                                    <input type="hidden" id="pt_id_hidden">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Jam Masuk</label>
                                    <div class="flex items-center gap-2 px-3 py-3 bg-white border border-slate-200 rounded-xl focus-within:ring-2 focus-within:ring-blue-500 transition">
                                        <i class="far fa-clock text-blue-500"></i>
                                        <input type="time" id="jam_masuk" class="bg-transparent outline-none w-full text-slate-700 text-sm">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 text-center">Jam Keluar</label>
                                    <div class="flex items-center gap-2 px-3 py-3 bg-white border border-slate-200 rounded-xl focus-within:ring-2 focus-within:ring-blue-500 transition">
                                        <i class="far fa-clock text-red-500"></i>
                                        <input type="time" id="jam_keluar" class="bg-transparent outline-none w-full text-slate-700 text-sm">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">No. Telepon/WA</label>
                                <input type="text" id="no_tlp" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm" placeholder="0812xxxx">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tanggal Mulai PKL</label>
                                <input type="date" id="tgl_masuk_pkl" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Pembimbing Sekolah</label>
                                <input type="text" id="pembimbing_pkl" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm" placeholder="Nama Guru Pembimbing">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col md:flex-row gap-4 justify-between border-t border-slate-100">
                        <button type="button" onclick="deleteProfile()" class="text-red-500 hover:text-red-700 font-bold text-xs transition order-2 md:order-1">
                            <i class="fas fa-trash-alt mr-1"></i> Kosongkan Informasi PKL
                        </button>

                        <button type="submit" id="btn-save" class="bg-blue-600 text-white px-8 py-4 md:py-3 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center order-1 md:order-2">
                            <i class="fas fa-save mr-2"></i> Simpan Informasi
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
    const SB_URL = "https://lvrhcsxeowvcrlokospr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUserId = null;
    let currentUserEmail = null;

    // --- SIDEBAR TOGGLE ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const icon = document.getElementById('menu-icon');
        const isClosed = sidebar.classList.contains('-translate-x-full');

        if (isClosed) {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.classList.add('no-scroll');
        } else {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.classList.remove('no-scroll');
        }
    }

    async function loadProfile() {
        try {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = '../login.html'; return; }
            
            currentUserId = session.user.id;
            currentUserEmail = session.user.email;

            // 1. Ambil data MASTER dari tabel 'users'
            const { data: userData } = await _supabase
                .from('users')
                .select('*')
                .eq('id', currentUserId)
                .maybeSingle();

            if (userData) {
                document.getElementById('nama').value = userData.nama || '';
                document.getElementById('nis').value = userData.nis || '';
                document.getElementById('kelas').value = userData.kelas || '';
                document.getElementById('avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.nama || 'Siswa')}&background=random`;
            }

            // 2. Ambil data TAMBAHAN dari 'profil_siswa'
            const { data: profilData } = await _supabase
                .from('profil_siswa')
                .select(`*, pt!profil_siswa_pt_id_fkey (nama_pt)`)
                .eq('user_id', currentUserId)
                .maybeSingle();

            if (profilData) {
                document.getElementById('no_tlp').value = profilData.no_tlp || '';
                document.getElementById('tgl_masuk_pkl').value = profilData.tgl_masuk_pkl || '';
                document.getElementById('pembimbing_pkl').value = profilData.pembimbing_pkl || '';
                document.getElementById('pt_id_hidden').value = profilData.pt_id || '';
                document.getElementById('jam_masuk').value = profilData.jam_masuk || '';
                document.getElementById('jam_keluar').value = profilData.jam_keluar || '';

                if (profilData.pt) {
                    document.getElementById('nama_pt').value = profilData.pt.nama_pt;
                }
            }

        } catch (err) { console.error("Load error:", err); }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan...';

        try {
            const ptIdToSave = document.getElementById('pt_id_hidden').value;

            const { error } = await _supabase
                .from('profil_siswa')
                .upsert({
                    user_id: currentUserId,
                    nama: document.getElementById('nama').value,
                    nis: document.getElementById('nis').value,
                    kelas: document.getElementById('kelas').value,
                    email: currentUserEmail,
                    no_tlp: document.getElementById('no_tlp').value,
                    tgl_masuk_pkl: document.getElementById('tgl_masuk_pkl').value || null,
                    pembimbing_pkl: document.getElementById('pembimbing_pkl').value,
                    pt_id: ptIdToSave || null,
                    jam_masuk: document.getElementById('jam_masuk').value || null,
                    jam_keluar: document.getElementById('jam_keluar').value || null
                }, { onConflict: 'user_id' });

            if (error) throw error;
            alert("Profil dan jadwal berhasil diperbarui!");
            loadProfile(); 

        } catch (err) {
            alert("Gagal simpan: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i> Simpan Informasi';
        }
    });

    async function deleteProfile() {
        if (!confirm("Hapus data tambahan PKL? (Nama & NIS tidak akan dihapus)")) return;
        const { error } = await _supabase
            .from('profil_siswa')
            .update({
                no_tlp: '',
                tgl_masuk_pkl: null,
                pembimbing_pkl: '',
                pt_id: null,
                jam_masuk: null,
                jam_keluar: null
            })
            .eq('user_id', currentUserId);

        if (!error) {
            alert("Data PKL dikosongkan.");
            location.reload();
        }
    }

    async function logout() {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
            await _supabase.auth.signOut();
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace("../login.html");
        }
    }

    document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
