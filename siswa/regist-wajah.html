<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrasi Wajah - SIMAPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* Mengatasi tampilan video agar tidak lonjong di HP */
        #video {
            transform: scaleX(-1);
            object-fit: cover;
        }

        /* Loading Overlay agar user tahu AI sedang dimuat */
        #loading-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            z-index: 99;
            align-items: center;
            justify-content: center;
            color: white;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row">

<div id="loading-overlay">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="font-bold tracking-widest text-sm">MENYIAPKAN AI BIOMETRIK...</p>
</div>

<aside class="hidden md:flex w-64 bg-slate-900 text-white p-6 flex-shrink-0 flex-col">
    <h1 class="text-2xl font-black mb-8 text-blue-400 italic">SIMAPK</h1>
    <nav class="space-y-2 flex-1">
        <a href="dashboard.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition"><i class="fas fa-home mr-3 w-5"></i>Dashboard</a>
        <a href="profil.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition"><i class="fas fa-user-circle mr-3 w-5"></i>Profil</a>
        <a href="absensi.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition"><i class="fas fa-camera mr-3 w-5"></i>Absensi</a>
        <a href="regist-wajah.html" class="flex items-center p-3 rounded-xl bg-blue-600 font-bold shadow-lg shadow-blue-900/20"><i class="fas fa-user-shield mr-3 w-5"></i>Regist Wajah</a>
    </nav>
    <button onclick="logout()" class="p-3 rounded-xl text-red-400 hover:bg-red-900/20 transition flex items-center">
        <i class="fas fa-sign-out-alt mr-3 w-5"></i>Keluar
    </button>
</aside>

<main class="flex-1 flex items-center justify-center p-4 md:p-10">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-xl p-6 md:p-8 border border-slate-100 text-center">
        <h2 class="text-xl md:text-2xl font-bold text-slate-800 mb-1">Registrasi Wajah</h2>
        <p class="text-slate-500 text-xs mb-6 px-4">Pindai wajah Anda untuk mengaktifkan fitur absensi biometrik.</p>

        <div class="relative aspect-square bg-black rounded-[2rem] overflow-hidden border-4 border-slate-100 mb-6 shadow-inner">
            <video id="video" autoplay playsinline muted class="w-full h-full"></video>
            
            <div class="absolute inset-0 border-[30px] border-slate-900/20 pointer-events-none">
                <div class="w-full h-full border-2 border-dashed border-blue-400/50 rounded-full"></div>
            </div>

            <div id="status-badge" class="absolute bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-slate-900/90 backdrop-blur-sm text-white text-[9px] font-bold tracking-widest uppercase">
                <i class="fas fa-circle-notch fa-spin mr-2 text-blue-400" id="status-icon"></i>
                <span id="status-text">Memulai Kamera...</span>
            </div>
        </div>

        <button onclick="captureFace()" id="btn-capture" disabled
            class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 disabled:bg-slate-200 disabled:text-slate-400 transition-all active:scale-95">
            DAFTARKAN WAJAH
        </button>

        <div class="mt-6 flex items-center justify-center gap-2 text-[9px] text-slate-400 font-bold uppercase tracking-widest">
            <i class="fas fa-lightbulb text-amber-400 text-xs"></i>
            <span>Cari area dengan cahaya terang</span>
        </div>
    </div>
</main>

<script>
    const SB_URL = "https://lvrhcsxeowvcrlokospr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cmhjc3hlb3d2Y3Jsb2tvc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDEyMjIsImV4cCI6MjA4ODExNzIyMn0.CSsNbgvaf2NR-Jcl91wNRRXIH44CrPF2Fnlv5G3qmI8"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUserId = null;

    async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.replace('login.html'); return; }
        currentUserId = session.user.id;

        const isRegistered = await checkExistingFace();
        if (isRegistered) {
            alert("Data wajah sudah terdaftar.");
            window.location.replace('dashboard.html');
            return;
        }

        await startCamera();
        await loadModels();
    }

    async function checkExistingFace() {
        const { data } = await _supabase.from('profil_siswa').select('face_descriptor').eq('user_id', currentUserId).maybeSingle();
        return (data && data.face_descriptor !== null);
    }

    async function loadModels() {
        // Gunakan URL model yang stabil
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('status-text').innerText = "AI SIAP";
            document.getElementById('status-icon').className = "fas fa-check-circle text-emerald-400 mr-2";
            document.getElementById('btn-capture').disabled = false;
        } catch (e) {
            console.error(e);
            document.getElementById('status-text').innerText = "GAGAL MEMUAT MODEL";
            alert("Gagal memuat AI. Pastikan internet stabil.");
        }
    }

    async function startCamera() {
        const video = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 640 }
                } 
            });
            video.srcObject = stream;
            document.getElementById('status-text').innerText = "MEMUAT AI...";
        } catch (e) {
            alert("Izin kamera ditolak atau tidak ditemukan!");
            document.getElementById('status-text').innerText = "KAMERA ERROR";
        }
    }

    async function captureFace() {
        const btn = document.getElementById('btn-capture');
        const video = document.getElementById('video');
        
        btn.disabled = true;
        btn.innerText = "MENGANALISA...";
        document.getElementById('status-text').innerText = "MENGUNCI TITIK WAJAH...";

        // Deteksi tunggal dengan akurasi tinggi
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

        if (!detection) {
            alert("Wajah tidak terdeteksi dengan jelas. Pastikan wajah terlihat penuh di dalam lingkaran.");
            btn.disabled = false;
            btn.innerText = "DAFTARKAN WAJAH";
            document.getElementById('status-text').innerText = "COBA LAGI";
            return;
        }

        const faceDescriptor = JSON.stringify(Array.from(detection.descriptor));

        const { error } = await _supabase
            .from('profil_siswa')
            .update({ face_descriptor: faceDescriptor })
            .eq('user_id', currentUserId);

        if (error) {
            alert("Gagal simpan: " + error.message);
            btn.disabled = false;
        } else {
            alert("Registrasi Berhasil!");
            window.location.replace('dashboard.html');
        }
    }

    async function logout() {
        if (confirm("Keluar?")) {
            await _supabase.auth.signOut();
            localStorage.clear();
            window.location.replace("../login.html");
        }
    }

    init();
</script>
</body>
</html>
